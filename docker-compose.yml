# ============================================================
# Docker Compose – Desa Wisata Kangbejo
# Untuk development & testing lokal
# ============================================================

services:
  kangbejo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kangbejo-website
    ports:
      - "8080:80"       # Akses di http://localhost:8080
    restart: unless-stopped
    volumes:
      # Mount volume untuk development (opsional, hapus di production)
      - ./index.html:/usr/share/nginx/html/index.html:ro
      - ./style.css:/usr/share/nginx/html/style.css:ro
      - ./script.js:/usr/share/nginx/html/script.js:ro
      - ./site-data.js:/usr/share/nginx/html/site-data.js:ro
      - ./admin:/usr/share/nginx/html/admin:ro
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Jalankan dengan: docker compose up -d
# Akses di:        http://localhost:8080
# Admin panel:     http://localhost:8080/admin/
