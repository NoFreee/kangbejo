server {
    listen 80;
    server_name localhost;
    absolute_redirect off;

    # Root direktori file website
    root /usr/share/nginx/html;
    index index.html;

    # Charset
    charset utf-8;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    # Cache untuk assets statis (gambar, CSS, JS)
    location ~* \.(png|jpg|jpeg|gif|webp|svg|ico|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(css|js)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # Redirect /admin (tanpa slash) → /admin/
    location = /admin {
        return 301 /admin/;
    }

    # Halaman admin
    location /admin/ {
        alias /usr/share/nginx/html/admin/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # SPA fallback – semua route ke index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Sembunyikan file sensitif
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

    # Log
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
}
